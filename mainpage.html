<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Экибастуз: Городская AR-игра</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --accent: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --surface: #1e293b;
            --surface-light: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --gradient: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Анимированный фон */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            from {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            to {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Верхняя панель */
        .top-bar {
            background: var(--surface);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(30, 41, 59, 0.9);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: var(--surface-light);
            position: relative;
            transition: transform 0.3s;
        }

        .avatar:hover {
            transform: scale(1.1);
        }

        /* Рамки аватара */
        .avatar-frame-gold {
            box-shadow: 0 0 20px gold, inset 0 0 10px gold;
            border: 2px solid gold;
        }

        .avatar-frame-silver {
            box-shadow: 0 0 20px silver, inset 0 0 10px silver;
            border: 2px solid silver;
        }

        .avatar-frame-neon {
            box-shadow: 0 0 20px var(--primary), inset 0 0 10px var(--primary);
            border: 2px solid var(--primary);
            animation: neon-pulse 2s infinite;
        }

        @keyframes neon-pulse {
            0%, 100% { box-shadow: 0 0 20px var(--primary), inset 0 0 10px var(--primary); }
            50% { box-shadow: 0 0 30px var(--primary), inset 0 0 15px var(--primary); }
        }

        .stats {
            display: flex;
            gap: 1rem;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--surface-light);
            border-radius: 2rem;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .stat:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        /* Основной контент */
        .content {
            flex: 1;
            padding: 1rem;
            padding-bottom: 80px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* Карточки */
        .card {
            background: var(--surface);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }

        .card:hover::before {
            left: 100%;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        /* Кнопки */
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .btn-accent {
            background: var(--accent);
            color: white;
        }

        .btn-accent:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        /* Карта */
        .map-container {
            height: 400px;
            border-radius: 1rem;
            overflow: hidden;
            margin-top: 1rem;
            box-shadow: var(--shadow-lg);
        }

        /* Модальное окно */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal-card {
            background: var(--surface);
            border-radius: 1rem;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Навигация */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            display: flex;
            justify-content: space-around;
            padding: 0.5rem;
            box-shadow: 0 -4px 6px -1px rgba(0,0,0,0.3);
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(30, 41, 59, 0.95);
        }

        .nav-btn {
            flex: 1;
            padding: 0.75rem;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.75rem;
        }

        .nav-btn.active {
            color: var(--primary);
        }

        .nav-btn:hover {
            color: var(--primary);
            transform: translateY(-2px);
        }

        /* Анимированные фоны профиля */
        .profile-bg-animated-1 {
            background: linear-gradient(270deg, #667eea, #764ba2, #f093fb, #f5576c);
            background-size: 800% 800%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .profile-bg-animated-2 {
            background: linear-gradient(45deg, #00dbde, #fc00ff);
            background-size: 400% 400%;
            animation: gradientWave 10s ease infinite;
        }

        @keyframes gradientWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .profile-bg-animated-3 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #ffc107 100%);
            background-size: 400% 400%;
            animation: rainbow 8s ease infinite;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* Достижения */
        .achievement {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: linear-gradient(135deg, var(--warning), var(--accent));
            border-radius: 2rem;
            font-size: 0.9rem;
            margin: 0.25rem;
            animation: achievementPop 0.5s ease;
        }

        @keyframes achievementPop {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Прогресс бар */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--surface-light);
            border-radius: 4px;
            overflow: hidden;
            margin: 0.5rem 0;
        }

        .progress-fill {
            height: 100%;
            background: var(--gradient);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        /* Сетка */
        .grid {
            display: grid;
            gap: 1rem;
        }

        .grid-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        .grid-3 {
            grid-template-columns: repeat(3, 1fr);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .grid-2, .grid-3 {
                grid-template-columns: 1fr;
            }
            
            .stats {
                flex-direction: column;
                gap: 0.5rem;
            }
            
            .stat {
                width: 100%;
                justify-content: center;
            }
        }

        /* Уведомления */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            padding: 1rem 2rem;
            border-radius: 2rem;
            box-shadow: var(--shadow-lg);
            z-index: 3000;
            animation: toastSlide 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        @keyframes toastSlide {
            from {
                transform: translateX(-50%) translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        /* Маркеры на карте */
        .quest-marker {
            background: var(--surface);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            white-space: nowrap;
            box-shadow: var(--shadow);
            border: 2px solid var(--primary);
        }

        .user-marker {
            font-size: 2rem;
            filter: drop-shadow(0 0 10px var(--primary));
        }

        /* Формы */
        input, textarea, select {
            width: 100%;
            padding: 0.75rem;
            background: var(--surface-light);
            border: 2px solid transparent;
            border-radius: 0.5rem;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s;
            margin: 0.5rem 0;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* Табы */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            overflow-x: auto;
        }

        .tab-btn {
            padding: 0.75rem 1.5rem;
            background: var(--surface-light);
            border: none;
            border-radius: 0.5rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .tab-btn:hover {
            background: var(--primary);
            color: white;
        }

        /* Магазин сетка */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
        }

        .shop-item {
            background: var(--surface-light);
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .shop-item:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .shop-item-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .shop-item-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .shop-item-price {
            color: var(--accent);
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* Список */
        .list-item {
            background: var(--surface-light);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .list-item:hover {
            transform: translateX(5px);
            box-shadow: var(--shadow);
        }

        /* Бейджи */
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: var(--surface-light);
            border-radius: 1rem;
            font-size: 0.85rem;
            margin: 0.25rem;
        }

        .badge-primary {
            background: var(--primary);
            color: white;
        }

        .badge-accent {
            background: var(--accent);
            color: white;
        }

        .badge-danger {
            background: var(--danger);
            color: white;
        }

        /* Спецэффекты */
        .glow {
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary); }
            to { text-shadow: 0 0 20px var(--primary), 0 0 30px var(--primary); }
        }

        .shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Скрытые элементы */
        .hidden {
            display: none !important;
        }

        /* Загрузка */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--surface-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <!-- Анимированный фон -->
    <div class="animated-bg" id="animatedBg"></div>

    <!-- Верхняя панель -->
    <div class="top-bar">
        <div class="user-info">
            <div class="avatar" id="userAvatar">👤</div>
            <div>
                <div style="font-weight: 600;" id="userName">Гость</div>
                <div style="font-size: 0.85rem; color: var(--text-muted);" id="userLevel">Уровень 1</div>
            </div>
        </div>
        <div class="stats">
            <div class="stat">
                <i class="fas fa-bolt"></i>
                <span id="userXP">0 XP</span>
            </div>
            <div class="stat">
                <i class="fas fa-coins"></i>
                <span id="userCoins">0 🪙</span>
            </div>
            <div class="stat">
                <i class="fas fa-trophy"></i>
                <span id="userAchievements">0</span>
            </div>
        </div>
    </div>

    <!-- Основной контент -->
    <div class="content" id="content">
        <!-- Контент будет загружаться динамически -->
    </div>

    <!-- Нижняя навигация -->
    <div class="bottom-nav">
        <button class="nav-btn active" data-page="map">
            <i class="fas fa-map"></i>
            <span>Карта</span>
        </button>
        <button class="nav-btn" data-page="quests">
            <i class="fas fa-tasks"></i>
            <span>Квесты</span>
        </button>
        <button class="nav-btn" data-page="create">
            <i class="fas fa-plus-circle"></i>
            <span>Создать</span>
        </button>
        <button class="nav-btn" data-page="shop">
            <i class="fas fa-store"></i>
            <span>Магазин</span>
        </button>
        <button class="nav-btn" data-page="profile">
            <i class="fas fa-user"></i>
            <span>Профиль</span>
        </button>
    </div>

    <!-- Скрипты -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script>
        // Глобальные переменные
        let currentUser = null;
        let currentPage = 'map';
        let map = null;
        let markers = [];
        let routingControl = null;

        // Инициализация данных
        function initData() {
            // Загрузка пользователя
            const savedUser = localStorage.getItem('ekb_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                updateUserUI();
            }

            // Создание анимированного фона
            createAnimatedBackground();

            // Загрузка начальных данных
            if (!localStorage.getItem('ekb_quests')) {
                const defaultQuests = [
                    {
                        id: 'q1',
                        title: 'Уборка парка',
                        description: 'Помоги убрать мусор в центральном парке',
                        lat: 51.7273,
                        lng: 72.4166,
                        xpReward: 100,
                        coinReward: 50,
                        status: 'active',
                        creator: 'system'
                    }
                ];
                localStorage.setItem('ekb_quests', JSON.stringify(defaultQuests));
            }

            if (!localStorage.getItem('ekb_shop')) {
                const shopItems = [
                    // Аватары
                    { id: 'av1', name: 'Путешественник', type: 'avatar', icon: '🧳', price: 100 },
                    { id: 'av2', name: 'Строитель', type: 'avatar', icon: '👷', price: 150 },
                    { id: 'av3', name: 'Художник', type: 'avatar', icon: '🎨', price: 200 },
                    { id: 'av4', name: 'Ученый', type: 'avatar', icon: '🔬', price: 250 },
                    { id: 'av5', name: 'Астронавт', type: 'avatar', icon: '👨‍🚀', price: 500 },
                    { id: 'av6', name: 'Супергерой', type: 'avatar', icon: '🦸', price: 1000 },
                    
                    // Рамки
                    { id: 'frame1', name: 'Золотая рамка', type: 'frame', class: 'avatar-frame-gold', price: 300 },
                    { id: 'frame2', name: 'Серебряная рамка', type: 'frame', class: 'avatar-frame-silver', price: 200 },
                    { id: 'frame3', name: 'Неоновая рамка', type: 'frame', class: 'avatar-frame-neon', price: 400 },
                    
                    // Фоны
                    { id: 'bg1', name: 'Градионт', type: 'background', class: 'profile-bg-animated-1', price: 500 },
                    { id: 'bg2', name: 'Волна', type: 'background', class: 'profile-bg-animated-2', price: 600 },
                    { id: 'bg3', name: 'Радуга', type: 'background', class: 'profile-bg-animated-3', price: 700 },
                    
                    // Эффекты
                    { id: 'eff1', name: 'Свечение', type: 'effect', class: 'glow', price: 400 },
                    { id: 'eff2', name: 'Тряска', type: 'effect', class: 'shake', price: 300 }
                ];
                localStorage.setItem('ekb_shop', JSON.stringify(shopItems));
            }
        }

        // Создание анимированного фона
        function createAnimatedBackground() {
            const bg = document.getElementById('animatedBg');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                bg.appendChild(particle);
            }
        }

        // Обновление UI пользователя
        function updateUserUI() {
            if (!currentUser) return;

            document.getElementById('userName').textContent = currentUser.name || 'Игрок';
            document.getElementById('userLevel').textContent = `Уровень ${currentUser.level || 1}`;
            document.getElementById('userXP').textContent = `${currentUser.xp || 0} XP`;
            document.getElementById('userCoins').textContent = `${currentUser.coins || 0} 🪙`;
            document.getElementById('userAchievements').textContent = currentUser.achievements?.length || 0;

            const avatar = document.getElementById('userAvatar');
            avatar.textContent = currentUser.avatar || '👤';
            
            // Применение рамки
            if (currentUser.frame) {
                avatar.className = 'avatar ' + currentUser.frame;
            } else {
                avatar.className = 'avatar';
            }
        }

        // Навигация
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPage = btn.dataset.page;
                renderPage();
            });
        });

        // Рендер страниц
        function renderPage() {
            const content = document.getElementById('content');
            content.style.opacity = '0';
            
            setTimeout(() => {
                switch(currentPage) {
                    case 'map':
                        renderMap();
                        break;
                    case 'quests':
                        renderQuests();
                        break;
                    case 'create':
                        renderCreate();
                        break;
                    case 'shop':
                        renderShop();
                        break;
                    case 'profile':
                        renderProfile();
                        break;
                }
                content.style.opacity = '1';
            }, 300);
        }

        // Рендер карты
        function renderMap() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="card">
                    <h2><i class="fas fa-map-marked-alt"></i> Карта Экибастуза</h2>
                    <div id="map" class="map-container"></div>
                </div>
            `;

            // Инициализация карты
            setTimeout(() => {
                if (!map) {
                    map = L.map('map').setView([51.7273, 72.4166], 13);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap contributors'
                    }).addTo(map);
                }
                
                // Очистка старых маркеров
                markers.forEach(m => map.removeLayer(m));
                markers = [];

                // Загрузка и отображение квестов
                const quests = JSON.parse(localStorage.getItem('ekb_quests') || '[]');
                quests.filter(q => q.status === 'active').forEach(quest => {
                    const marker = L.marker([quest.lat, quest.lng])
                        .addTo(map)
                        .bindPopup(`
                            <div style="text-align: center;">
                                <h3>${quest.title}</h3>
                                <p>${quest.description}</p>
                                <div style="margin: 10px 0;">
                                    <span class="badge badge-primary">${quest.xpReward} XP</span>
                                    <span class="badge badge-accent">${quest.coinReward} 🪙</span>
                                </div>
                                <button class="btn btn-primary" onclick="startQuest('${quest.id}')">
                                    <i class="fas fa-play"></i> Начать
                                </button>
                            </div>
                        `);
                    markers.push(marker);
                });
            }, 100);
        }

        // Рендер квестов
        function renderQuests() {
            const content = document.getElementById('content');
            const quests = JSON.parse(localStorage.getItem('ekb_quests') || '[]');
            const activeQuests = quests.filter(q => q.status === 'active');
            
            content.innerHTML = `
                <div class="card">
                    <h2><i class="fas fa-tasks"></i> Активные квесты</h2>
                    ${activeQuests.length === 0 ? 
                        '<p style="text-align: center; color: var(--text-muted);">Сейчас нет активных квестов</p>' :
                        activeQuests.map(quest => `
                            <div class="list-item">
                                <div>
                                    <h3>${quest.title}</h3>
                                    <p style="color: var(--text-muted); font-size: 0.9rem;">${quest.description}</p>
                                    <div style="margin-top: 0.5rem;">
                                        <span class="badge badge-primary">${quest.xpReward} XP</span>
                                        <span class="badge badge-accent">${quest.coinReward} 🪙</span>
                                    </div>
                                </div>
                                <button class="btn btn-primary" onclick="startQuest('${quest.id}')">
                                    <i class="fas fa-play"></i>
                                </button>
                            </div>
                        `).join('')
                    }
                </div>
            `;
        }

        // Рендер создания квеста
        function renderCreate() {
            if (!currentUser) {
                showToast('Сначала войдите в систему', 'error');
                return;
            }

            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="card">
                    <h2><i class="fas fa-plus-circle"></i> Создать квест</h2>
                    <form id="createQuestForm">
                        <input type="text" id="questTitle" placeholder="Название квеста" required>
                        <textarea id="questDescription" placeholder="Описание квеста" rows="3" required></textarea>
                        
                        <div style="margin: 1rem 0;">
                            <label style="display: block; margin-bottom: 0.5rem;">Выберите местоположение:</label>
                            <div class="grid grid-2">
                                <button type="button" class="btn btn-outline" onclick="selectCurrentLocation()">
                                    <i class="fas fa-location-arrow"></i> Моё местоположение
                                </button>
                                <button type="button" class="btn btn-outline" onclick="selectOnMap()">
                                    <i class="fas fa-map-pin"></i> На карте
                                </button>
                            </div>
                            <input type="hidden" id="questLat" required>
                            <input type="hidden" id="questLng" required>
                            <div id="selectedLocation" style="margin-top: 0.5rem; color: var(--text-muted);"></div>
                        </div>
                        
                        <div class="grid grid-2">
                            <div>
                                <label style="display: block; margin-bottom: 0.5rem;">Награда XP:</label>
                                <input type="number" id="questXP" placeholder="100" min="10" max="1000" value="100" required>
                            </div>
                            <div>
                                <label style="display: block; margin-bottom: 0.5rem;">Награда монет:</label>
                                <input type="number" id="questCoins" placeholder="50" min="10" max="500" value="50" required>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                            <i class="fas fa-paper-plane"></i> Отправить на модерацию
                        </button>
                    </form>
                </div>
            `;

            // Обработка формы
            document.getElementById('createQuestForm').addEventListener('submit', (e) => {
                e.preventDefault();
                
                const quest = {
                    id: 'q_' + Date.now(),
                    title: document.getElementById('questTitle').value,
                    description: document.getElementById('questDescription').value,
                    lat: parseFloat(document.getElementById('questLat').value),
                    lng: parseFloat(document.getElementById('questLng').value),
                    xpReward: parseInt(document.getElementById('questXP').value),
                    coinReward: parseInt(document.getElementById('questCoins').value),
                    status: 'pending',
                    creator: currentUser.id,
                    createdAt: new Date().toISOString()
                };

                // Сохранение квеста
                const quests = JSON.parse(localStorage.getItem('ekb_quests') || '[]');
                quests.push(quest);
                localStorage.setItem('ekb_quests', JSON.stringify(quests));

                showToast('Квест отправлен на модерацию!', 'success');
                renderPage();
            });
        }

        // Рендер магазина
        function renderShop() {
            if (!currentUser) {
                showToast('Сначала войдите в систему', 'error');
                return;
            }

            const content = document.getElementById('content');
            const shopItems = JSON.parse(localStorage.getItem('ekb_shop') || '[]');
            
            // Фильтрация по категориям
            const categories = ['avatar', 'frame', 'background', 'effect'];
            const tabs = categories.map(cat => `
                <button class="tab-btn ${cat === 'avatar' ? 'active' : ''}" onclick="showShopCategory('${cat}')">
                    ${cat === 'avatar' ? 'Аватары' : 
                      cat === 'frame' ? 'Рамки' : 
                      cat === 'background' ? 'Фоны' : 'Эффекты'}
                </button>
            `).join('');

            content.innerHTML = `
                <div class="card">
                    <h2><i class="fas fa-store"></i> Магазин</h2>
                    <div class="tabs">${tabs}</div>
                    <div class="shop-grid" id="shopGrid">
                        ${renderShopItems('avatar')}
                    </div>
                </div>
            `;
        }

        // Рендер товаров магазина
        function renderShopItems(category) {
            const shopItems = JSON.parse(localStorage.getItem('ekb_shop') || '[]');
            const items = shopItems.filter(item => item.type === category);
            
            return items.map(item => {
                const owned = currentUser.inventory?.includes(item.id) || false;
                const equipped = 
                    (category === 'avatar' && currentUser.avatar === item.icon) ||
                    (category === 'frame' && currentUser.frame === item.class) ||
                    (category === 'background' && currentUser.background === item.class) ||
                    (category === 'effect' && currentUser.effect === item.class);
                
                return `
                    <div class="shop-item ${owned ? 'owned' : ''}" onclick="${owned ? 'equipItem' : 'buyItem'}('${item.id}', '${category}')">
                        <div class="shop-item-icon">
                            ${item.type === 'avatar' ? item.icon :
                              item.type === 'frame' ? '🖼️' :
                              item.type === 'background' ? '🎨' : '✨'}
                        </div>
                        <div class="shop-item-name">${item.name}</div>
                        <div class="shop-item-price">
                            ${owned ? (equipped ? 'Надето' : 'Надеть') : `${item.price} 🪙`}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Рендер профиля
        function renderProfile() {
            if (!currentUser) {
                showToast('Сначала войдите в систему', 'error');
                return;
            }

            const content = document.getElementById('content');
            const achievements = currentUser.achievements || [];
            
            content.innerHTML = `
                <div class="card ${currentUser.background || ''}">
                    <div style="text-align: center;">
                        <div class="avatar ${currentUser.frame || ''} ${currentUser.effect || ''}" style="font-size: 5rem; margin: 0 auto;">
                            ${currentUser.avatar || '👤'}
                        </div>
                        <h2 style="margin-top: 1rem;">${currentUser.name || 'Игрок'}</h2>
                        <p style="color: var(--text-muted);">Уровень ${currentUser.level || 1}</p>
                        
                        <div class="progress-bar" style="margin: 1rem 0;">
                            <div class="progress-fill" style="width: ${(currentUser.xp || 0) % 100}%"></div>
                        </div>
                        <p style="color: var(--text-muted); font-size: 0.9rem;">
                            ${(currentUser.xp || 0)} XP до следующего уровня
                        </p>
                    </div>
                </div>
                
                <div class="card">
                    <h3><i class="fas fa-trophy"></i> Достижения</h3>
                    ${achievements.length === 0 ? 
                        '<p style="text-align: center; color: var(--text-muted);">Пока нет достижений</p>' :
                        achievements.map(ach => `
                            <div class="achievement">
                                <i class="fas fa-medal"></i>
                                <span>${ach}</span>
                            </div>
                        `).join('')
                    }
                </div>
                
                <div class="card">
                    <h3><i class="fas fa-chart-line"></i> Статистика</h3>
                    <div class="grid grid-2">
                        <div class="stat">
                            <i class="fas fa-tasks"></i>
                            <div>
                                <div style="font-size: 1.5rem; font-weight: bold;">${currentUser.completedQuests || 0}</div>
                                <div style="font-size: 0.85rem; color: var(--text-muted);">Квестов выполнено</div>
                            </div>
                        </div>
                        <div class="stat">
                            <i class="fas fa-coins"></i>
                            <div>
                                <div style="font-size: 1.5rem; font-weight: bold;">${currentUser.totalCoins || 0}</div>
                                <div style="font-size: 0.85rem; color: var(--text-muted);">Всего монет</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <button class="btn btn-outline" style="width: 100%;" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            `;
        }

        // Выбор текущего местоположения
        function selectCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        document.getElementById('questLat').value = position.coords.latitude;
                        document.getElementById('questLng').value = position.coords.longitude;
                        document.getElementById('selectedLocation').textContent = 
                            `📍 Местоположение установлено: ${position.coords.latitude.toFixed(6)}, ${position.coords.longitude.toFixed(6)}`;
                        showToast('Местоположение определено!', 'success');
                    },
                    (error) => {
                        showToast('Не удалось определить местоположение', 'error');
                    }
                );
            } else {
                showToast('Геолокация не поддерживается', 'error');
            }
        }

        // Выбор на карте
        function selectOnMap() {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-card">
                    <h3>Выберите место на карте</h3>
                    <div id="selectMap" style="height: 400px; margin: 1rem 0; border-radius: 0.5rem;"></div>
                    <button class="btn btn-primary" onclick="confirmMapSelection()">
                        <i class="fas fa-check"></i> Подтвердить
                    </button>
                    <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()" style="margin-left: 0.5rem;">
                        Отмена
                    </button>
                </div>
            `;
            document.body.appendChild(modal);

            // Инициализация карты для выбора
            setTimeout(() => {
                const selectMap = L.map('selectMap').setView([51.7273, 72.4166], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(selectMap);
                
                let selectedMarker = null;
                selectMap.on('click', (e) => {
                    if (selectedMarker) {
                        selectMap.removeLayer(selectedMarker);
                    }
                    selectedMarker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(selectMap);
                    window.selectedLatLng = e.latlng;
                });
            }, 100);
        }

        // Подтверждение выбора на карте
        function confirmMapSelection() {
            if (window.selectedLatLng) {
                document.getElementById('questLat').value = window.selectedLatLng.lat;
                document.getElementById('questLng').value = window.selectedLatLng.lng;
                document.getElementById('selectedLocation').textContent = 
                    `📍 Место выбрано: ${window.selectedLatLng.lat.toFixed(6)}, ${window.selectedLatLng.lng.toFixed(6)}`;
                document.querySelector('.modal-overlay').remove();
                showToast('Место выбрано!', 'success');
            } else {
                showToast('Сначала выберите место на карте', 'error');
            }
        }

        // Показ категории магазина
        window.showShopCategory = function(category) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('shopGrid').innerHTML = renderShopItems(category);
        };

        // Покупка предмета
        window.buyItem = function(itemId, category) {
            const shopItems = JSON.parse(localStorage.getItem('ekb_shop') || '[]');
            const item = shopItems.find(i => i.id === itemId);
            
            if (!item) return;
            
            if ((currentUser.coins || 0) < item.price) {
                showToast('Недостаточно монет!', 'error');
                return;
            }
            
            // Списание монет
            currentUser.coins = (currentUser.coins || 0) - item.price;
            
            // Добавление в инвентарь
            if (!currentUser.inventory) currentUser.inventory = [];
            currentUser.inventory.push(itemId);
            
            // Сохранение
            localStorage.setItem('ekb_user', JSON.stringify(currentUser));
            updateUserUI();
            
            showToast(`${item.name} куплено!`, 'success');
            renderShop();
        };

        // Экипировка предмета
        window.equipItem = function(itemId, category) {
            const shopItems = JSON.parse(localStorage.getItem('ekb_shop') || '[]');
            const item = shopItems.find(i => i.id === itemId);
            
            if (!item) return;
            
            // Применение предмета
            if (category === 'avatar') {
                currentUser.avatar = item.icon;
            } else if (category === 'frame') {
                currentUser.frame = item.class;
            } else if (category === 'background') {
                currentUser.background = item.class;
            } else if (category === 'effect') {
                currentUser.effect = item.class;
            }
            
            // Сохранение
            localStorage.setItem('ekb_user', JSON.stringify(currentUser));
            updateUserUI();
            
            showToast(`${item.name} надето!`, 'success');
            
            if (currentPage === 'profile') {
                renderProfile();
            } else {
                renderShop();
            }
        };

        // Начать квест
        window.startQuest = function(questId) {
            if (!currentUser) {
                showToast('Сначала войдите в систему', 'error');
                return;
            }
            
            const quests = JSON.parse(localStorage.getItem('ekb_quests') || '[]');
            const quest = quests.find(q => q.id === questId);
            
            if (!quest) return;
            
            // Симуляция выполнения квеста
            showToast('Квест начат! Выполняйте задание...', 'info');
            
            // Через 3 секунды - завершение
            setTimeout(() => {
                // Начисление награды
                currentUser.xp = (currentUser.xp || 0) + quest.xpReward;
                currentUser.coins = (currentUser.coins || 0) + quest.coinReward;
                
                // Обновление уровня
                const newLevel = Math.floor((currentUser.xp || 0) / 100) + 1;
                if (newLevel > (currentUser.level || 1)) {
                    currentUser.level = newLevel;
                    showToast(`Новый уровень: ${newLevel}!`, 'success');
                    
                    // Добавление достижения
                    if (!currentUser.achievements) currentUser.achievements = [];
                    currentUser.achievements.push(`Достиг уровня ${newLevel}`);
                }
                
                // Статистика
                currentUser.completedQuests = (currentUser.completedQuests || 0) + 1;
                currentUser.totalCoins = (currentUser.totalCoins || 0) + quest.coinReward;
                
                // Сохранение
                localStorage.setItem('ekb_user', JSON.stringify(currentUser));
                updateUserUI();
                
                showToast(`Квест выполнен! +${quest.xpReward} XP, +${quest.coinReward} 🪙`, 'success');
                
                // Удаление выполненного квеста
                const index = quests.findIndex(q => q.id === questId);
                if (index > -1) {
                    quests.splice(index, 1);
                    localStorage.setItem('ekb_quests', JSON.stringify(quests));
                }
                
                // Обновление страницы
                if (currentPage === 'quests') {
                    renderQuests();
                } else if (currentPage === 'map') {
                    renderMap();
                }
            }, 3000);
        };

        // Уведомления
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            
            const icon = type === 'success' ? '✅' : 
                         type === 'error' ? '❌' : 
                         type === 'warning' ? '⚠️' : 'ℹ️';
            
            toast.innerHTML = `<span>${icon}</span> ${message}`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Выход
        function logout() {
            if (confirm('Вы уверены, что хотите выйти?')) {
                localStorage.removeItem('ekb_user');
                currentUser = null;
                location.reload();
            }
        }

        // Инициализация при загрузке
        window.addEventListener('load', () => {
            initData();
            renderPage();
            
            // Проверка на первого пользователя
            if (!currentUser) {
                setTimeout(() => {
                    showToast('Добро пожаловать! Войдите или зарегистрируйтесь', 'info');
                }, 1000);
            }
        });

        // Периодическое сохранение
        setInterval(() => {
            if (currentUser) {
                localStorage.setItem('ekb_user', JSON.stringify(currentUser));
            }
        }, 5000);
    </script>
</body>

</html>
