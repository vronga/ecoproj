<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ДоброКвест 3.0 — Экибастуз</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --secondary: #3b82f6;
            --accent: #f59e0b;
            --bg-color: #0f172a;
            --surface: #1e293b;
            --surface-light: #334155;
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --danger: #ef4444;
            --success: #10b981;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 90px;
            overflow-x: hidden;
            background-image: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
            background-attachment: fixed;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        /* Навигация */
        .mobile-bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 10px 25px;
            border-top: 1px solid var(--glass-border);
            z-index: 9999;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.5);
        }

        .bottom-nav-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            gap: 6px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 8px;
            border-radius: 16px;
            position: relative;
            width: 60px;
        }

        .bottom-nav-btn i {
            font-size: 1.5rem;
            transition: transform 0.3s;
        }

        .bottom-nav-btn.active {
            color: var(--primary);
            background: rgba(16, 185, 129, 0.1);
            transform: translateY(-5px);
        }

        .bottom-nav-btn.active i {
            transform: scale(1.2);
        }

        .bottom-nav-btn .badge {
            position: absolute;
            top: 0;
            right: 5px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .app-container {
            max-width: 768px;
            margin: 0 auto;
            padding: 1rem;
            animation: fadeIn 0.4s ease;
        }

        /* Карточки */
        .card {
            background: var(--surface);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
        }

        /* Карта */
        .map-container {
            height: 450px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--surface-light);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .leaflet-container {
            background: #1a1a1a;
        }

        .leaflet-popup-content-wrapper {
            background: var(--surface);
            color: var(--text-main);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .leaflet-popup-tip {
            background: var(--surface);
        }

        /* Кнопки */
        .btn {
            padding: 14px 24px;
            border-radius: 16px;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-accent {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #fff;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--surface-light);
            color: var(--text-main);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        /* Элементы списков */
        .list-item {
            background: var(--surface-light);
            border-radius: 16px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            border-left: 6px solid var(--primary);
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
        }

        .list-item:hover {
            transform: translateX(5px);
        }

        .list-item.urgent {
            border-left-color: var(--danger);
        }

        /* Профиль и кастомизация */
        .profile-header {
            text-align: center;
            padding: 3rem 1rem;
            border-radius: 24px;
            margin-bottom: 1.5rem;
            background-size: cover;
            background-position: center;
            position: relative;
            border: 2px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .profile-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--surface) 10%, transparent);
            border-radius: 22px;
        }

        .profile-content {
            position: relative;
            z-index: 2;
        }

        .avatar-lg {
            font-size: 5rem;
            display: inline-block;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2));
            position: relative;
        }

        .avatar-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 7rem;
            pointer-events: none;
        }

        /* Прогресс бары */
        .progress-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            height: 16px;
            margin: 12px 0;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--accent), #fbbf24);
            height: 100%;
            width: 0%;
            border-radius: 30px;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px var(--accent);
        }

        .donation-fill {
            background: linear-gradient(90deg, var(--secondary), #60a5fa);
            box-shadow: 0 0 10px var(--secondary);
        }

        /* Магазин */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
        }

        .shop-card {
            background: var(--surface-light);
            border-radius: 20px;
            padding: 1.2rem;
            text-align: center;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .shop-card .preview {
            font-size: 3.5rem;
            margin-bottom: 10px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Модалки */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 1rem;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        .modal-card {
            background: var(--surface);
            border-radius: 28px;
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            animation: slideUp 0.3s forwards;
        }

        /* Формы */
        input,
        textarea,
        select {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: 2px solid var(--surface-light);
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-main);
            margin-bottom: 1.2rem;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus,
        textarea:focus {
            border-color: var(--primary);
            outline: none;
            background: rgba(16, 185, 129, 0.05);
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #000;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 10001;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            animation: slideDown 0.3s ease, fadeOut 0.3s ease 2.5s forwards;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Утилиты */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            background: var(--surface-light);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent);
        }

        .text-center {
            text-align: center;
        }

        .mt-1 {
            margin-top: 1rem;
        }

        .mb-1 {
            margin-bottom: 1rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                transform: translate(-50%, -20px);
                opacity: 0;
            }

            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        /* Стили маркеров Leaflet */
        .user-marker {
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.5));
            animation: bounce 2s infinite ease-in-out;
        }

        .quest-marker {
            background: var(--surface);
            color: var(--text-main);
            border-radius: 20px;
            padding: 5px 10px;
            font-weight: bold;
            border: 2px solid var(--primary);
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        /* Вкладки */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 1rem;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tab-btn {
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--surface-light);
            border: none;
            color: var(--text-muted);
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 16px;
            text-align: center;
            flex: 1;
            border: 1px solid var(--glass-border);
        }

        .stat-box i {
            font-size: 1.5rem;
            margin-bottom: 5px;
            display: block;
        }
    </style>
</head>

<body>

    <div class="app-container" id="appRoot"></div>

    <div class="mobile-bottom-nav" id="bottomNav">
        <button class="bottom-nav-btn active" data-page="map"><i
                class="fas fa-map-location-dot"></i><span>Карта</span></button>
        <button class="bottom-nav-btn" data-page="quests"><i class="fas fa-tasks"></i><span>Квесты</span></button>
        <button class="bottom-nav-btn" data-page="donations"><i
                class="fas fa-hand-holding-heart"></i><span>Сборы</span></button>
        <button class="bottom-nav-btn" data-page="shop"><i class="fas fa-store"></i><span>Лавка</span></button>
        <button class="bottom-nav-btn" data-page="profile"><i
                class="fas fa-user-ninja"></i><span>Профиль</span></button>
    </div>

    <script>
        // ==========================================
        // ГЛОБАЛЬНЫЕ КОНСТАНТЫ И ДАННЫЕ
        // ==========================================
        const EKIBASTUZ_COORDS = { lat: 51.7290, lng: 75.3266 };

        let currentUser = null;
        let allUsers = [];
        let quests = [];
        let submissions = [];
        let shopItems = [];
        let donations = [];

        let mapInstance = null;
        let routingControl = null;
        let markersLayer = null;
        let currentPage = 'map';
        let currentShopTab = 'avatars';
        let onlineInterval = null;

        // ==========================================
        // ИНИЦИАЛИЗАЦИЯ И СИДЫ (База Данных)
        // ==========================================
        function initData() {
            // Пользователи
            if (!localStorage.getItem('ekb_users')) {
                allUsers = [
                    {
                        id: 'mod_admin', name: 'Главный Модератор', email: 'moderator@ekb.kz', password: '12345676767aoao', login: 'moderationforsitebeta67',
                        points: 9999, xp: 50000, level: 99, avatar: '🐉', background: 'url(https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=1000&auto=format&fit=crop)', frame: '',
                        completedQuests: [], location: EKIBASTUZ_COORDS, role: 'moderator', inventory: [], activeBoosts: []
                    },
                    { id: 'npc1', name: 'Айгерим', points: 120, xp: 450, level: 2, avatar: '🦊', background: '', frame: '', location: { lat: 51.7250, lng: 75.3200 }, role: 'user', isOnline: true },
                    { id: 'npc2', name: 'Руслан_99', points: 300, xp: 1200, level: 4, avatar: '🦅', background: '', frame: '', location: { lat: 51.7350, lng: 75.3300 }, role: 'user', isOnline: true }
                ];
                save('ekb_users', allUsers);
            } else allUsers = load('ekb_users');

            // Квесты
            if (!localStorage.getItem('ekb_quests')) {
                quests = [
                    { id: 'q1', title: '❄️ Уборка снега у школы', description: 'Очистить дорожку к входу школы №10. Сделать фото до и после.', xpReward: 150, coinReward: 100, lat: 51.7312, lng: 75.3184, creatorId: 'mod_admin', status: 'active', type: 'physical' },
                    { id: 'q2', title: '🐕 Помощь приюту', description: 'Привезти корм или помочь с выгулом собак в приюте "Надежда".', xpReward: 200, coinReward: 150, lat: 51.7150, lng: 75.3400, creatorId: 'mod_admin', status: 'active', type: 'social' },
                    { id: 'q3', title: '🌳 Патруль парка Шахтёр', description: 'Собрать пластик в центральном парке. Нужен отчет.', xpReward: 100, coinReward: 80, lat: 51.7275, lng: 75.3250, creatorId: 'mod_admin', status: 'active', type: 'ecology' },
                    { id: 'q4', title: '👵 Доставка продуктов', description: 'Отнести пакет продуктов пенсионерке на ул. М.Ауэзова. Срочно!', xpReward: 250, coinReward: 200, lat: 51.7380, lng: 75.3210, creatorId: 'mod_admin', status: 'active', type: 'social', isUrgent: true }
                ];
                save('ekb_quests', quests);
            } else quests = load('ekb_quests');

            // Сборы (Донаты)
            if (!localStorage.getItem('ekb_donations')) {
                donations = [
                    { id: 'd1', title: '🚐 Газель для приюта', description: 'Собираем средства на ремонт транспорта для развоза животных.', goal: 10000, current: 4500, img: '🐾' },
                    { id: 'd2', title: '🌲 Саженцы для аллеи', description: 'Закупка сосен для высадки весной в новом микрорайоне.', goal: 5000, current: 1200, img: '🌱' },
                    { id: 'd3', title: '📚 Книги в детдом', description: 'Покупка развивающей литературы для интерната.', goal: 3000, current: 2850, img: '📖' }
                ];
                save('ekb_donations', donations);
            } else donations = load('ekb_donations');

            // Магазин
            if (!localStorage.getItem('ekb_shop')) {
                shopItems = [
                    // Аватары
                    { id: 's_av1', name: 'Кибер-ниндзя', type: 'avatar', emoji: '🥷', price: 300, desc: 'Быстрый и незаметный' },
                    { id: 's_av2', name: 'Шахтёр', type: 'avatar', emoji: '⛏️', price: 200, desc: 'Легенда Экибастуза' },
                    { id: 's_av3', name: 'Космонавт', type: 'avatar', emoji: '🧑‍🚀', price: 500, desc: 'Выше звезд' },
                    { id: 's_av4', name: 'Дракон', type: 'avatar', emoji: '🐲', price: 1000, desc: 'Мифическая редкость' },
                    // Фоны
                    { id: 's_bg1', name: 'Неон-Сити', type: 'background', value: 'url(https://images.unsplash.com/photo-1555680202-c86f0e12f086?q=80&w=1000&auto=format&fit=crop)', price: 800, desc: 'Киберпанк атмосфера' },
                    { id: 's_bg2', name: 'Закат в степи', type: 'background', value: 'url(https://images.unsplash.com/photo-1513622470522-26c308a34d25?q=80&w=1000&auto=format&fit=crop)', price: 600, desc: 'Родные просторы' },
                    { id: 's_bg3', name: 'Космос', type: 'background', value: 'url(https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=1000&auto=format&fit=crop)', price: 1200, desc: 'Глубокий космос' },
                    // Бусты
                    { id: 's_bs1', name: 'Кольцо Усердия', type: 'boost', value: 'xp_1.5', price: 400, desc: '+50% XP на 24 часа' },
                    { id: 's_bs2', name: 'Магнит Монет', type: 'boost', value: 'coin_2.0', price: 600, desc: 'x2 Монет на 24 часа' }
                ];
                save('ekb_shop', shopItems);
            } else shopItems = load('ekb_shop');

            if (!localStorage.getItem('ekb_submissions')) {
                submissions = []; save('ekb_submissions', submissions);
            } else submissions = load('ekb_submissions');
        }

        // Утилиты сохранения/загрузки
        function save(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
        function load(key) { return JSON.parse(localStorage.getItem(key)); }

        function showToast(msg, icon = '🔔') {
            const div = document.createElement('div');
            div.className = 'toast'; div.innerHTML = `<span>${icon}</span> ${msg}`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2800);
        }

        // ==========================================
        // ИГРОВАЯ ЛОГИКА & БУСТЫ
        // ==========================================
        function calcLevel(xp) { return Math.floor(1 + Math.sqrt(xp / 100)); } // Усложненная прогрессия

        function getMultiplier(type) {
            if (!currentUser || !currentUser.activeBoosts) return 1;
            let mult = 1;
            const now = Date.now();
            currentUser.activeBoosts = currentUser.activeBoosts.filter(b => b.expires > now); // чистка
            currentUser.activeBoosts.forEach(b => {
                if (b.type.startsWith(type)) mult *= parseFloat(b.type.split('_')[1]);
            });
            return mult;
        }

        function addRewards(userId, xpBase, coinBase) {
            const user = allUsers.find(u => u.id === userId);
            if (!user) return;

            // Если это текущий юзер, применяем его бусты
            let xpG = xpBase, coinG = coinBase;
            if (currentUser && currentUser.id === userId) {
                xpG = Math.floor(xpBase * getMultiplier('xp'));
                coinG = Math.floor(coinBase * getMultiplier('coin'));
            }

            user.xp = (user.xp || 0) + xpG;
            user.points = (user.points || 0) + coinG;

            const newLvl = calcLevel(user.xp);
            let lvlUp = false;
            if (newLvl > user.level) { user.level = newLvl; lvlUp = true; }

            if (currentUser && currentUser.id === userId) {
                currentUser = { ...user };
                showToast(`+${xpG} XP | +${coinG} 🪙`, '🎉');
                if (lvlUp) setTimeout(() => showToast(`Уровень повышен до ${newLvl}!`, '🔥'), 1000);
            }
            save('ekb_users', allUsers);
        }

        function donate(donationId, amount) {
            if (!currentUser) return showToast('Сначала войдите', '❌');
            if (currentUser.points < amount) return showToast('Недостаточно монет!', '💸');

            const don = donations.find(d => d.id === donationId);
            if (!don) return;

            currentUser.points -= amount;
            don.current += amount;

            // Синхронизация БД
            const dbU = allUsers.find(u => u.id === currentUser.id);
            if (dbU) dbU.points = currentUser.points;
            save('ekb_users', allUsers);
            save('ekb_donations', donations);

            showToast(`Вы пожертвовали ${amount}🪙`, '❤️');
            renderCurrentPage();
        }

        // Симуляция онлайн-юзеров (NPC бродят по Экибастузу)
        function simulateOnlineUsers() {
            if (onlineInterval) clearInterval(onlineInterval);
            onlineInterval = setInterval(() => {
                let moved = false;
                allUsers.forEach(u => {
                    if (u.id !== (currentUser?.id) && u.isOnline) {
                        // Случайное смещение
                        u.location.lat += (Math.random() - 0.5) * 0.002;
                        u.location.lng += (Math.random() - 0.5) * 0.002;
                        moved = true;
                    }
                });
                if (moved && currentPage === 'map' && mapInstance) refreshMapMarkers();
            }, 5000);
        }

        // ==========================================
        // КАРТА LEAFLET
        // ==========================================
        function initMap(containerId) {
            if (mapInstance) { mapInstance.remove(); mapInstance = null; }
            const center = currentUser?.location || EKIBASTUZ_COORDS;

            // Темная тема карты (CartoDB Dark Matter)
            mapInstance = L.map(containerId, { zoomControl: false }).setView([center.lat, center.lng], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap contributors © CARTO'
            }).addTo(mapInstance);

            L.control.zoom({ position: 'topright' }).addTo(mapInstance);
            markersLayer = L.layerGroup().addTo(mapInstance);

            refreshMapMarkers();
        }

        function refreshMapMarkers() {
            if (!markersLayer) return;
            markersLayer.clearLayers();

            // Рисуем квесты
            quests.filter(q => q.status === 'active').forEach(q => {
                const isUrg = q.isUrgent ? 'border-color: var(--danger); background: #450a0a;' : '';
                const html = `<div class="quest-marker" style="${isUrg}"><i class="fas fa-star" style="color:var(--accent)"></i> ${q.title.split(' ')[0]}</div>`;
                const icon = L.divIcon({ html, className: '', iconSize: [120, 30], iconAnchor: [60, 15] });
                const m = L.marker([q.lat, q.lng], { icon }).addTo(markersLayer);

                m.bindPopup(`
                <h4 style="margin-bottom:5px; color:var(--primary)">${q.title}</h4>
                <p style="font-size:0.85rem; margin-bottom:10px;">${q.description}</p>
                <div class="flex-between mb-1">
                    <span class="badge"><i class="fas fa-arrow-up"></i> ${q.xpReward} XP</span>
                    <span class="badge"><i class="fas fa-coins"></i> ${q.coinReward}</span>
                </div>
                <button class="btn btn-primary" style="width:100%; padding:8px;" onclick="startRouting(${q.lat}, ${q.lng})"><i class="fas fa-route"></i> Путь</button>
                <button class="btn btn-outline mt-1" style="width:100%; padding:8px;" onclick="openQuestSubmit('${q.id}')"><i class="fas fa-camera"></i> Выполнить</button>
            `);
            });

            // Рисуем других пользователей
            allUsers.forEach(u => {
                if (u.isOnline && u.id !== currentUser?.id) {
                    const html = `<div class="user-marker" style="font-size: 2rem;">${u.avatar}</div>`;
                    const m = L.marker([u.location.lat, u.location.lng], { icon: L.divIcon({ html, className: '' }) }).addTo(markersLayer);
                    m.bindPopup(`<b>${u.name}</b><br>Уровень: ${u.level}`);
                }
            });

            // Рисуем себя
            if (currentUser) {
                const html = `<div class="user-marker" style="font-size: 2.5rem; filter: drop-shadow(0 0 10px var(--primary));">${currentUser.avatar}</div>`;
                const m = L.marker([currentUser.location.lat, currentUser.location.lng], { icon: L.divIcon({ html, className: '' }) }).addTo(markersLayer);
                m.bindPopup(`<b>Ты здесь</b>`);
            }
        }

        window.startRouting = (lat, lng) => {
            if (!currentUser) return showToast('Нужна авторизация', '❌');
            if (routingControl) mapInstance.removeControl(routingControl);

            routingControl = L.Routing.control({
                waypoints: [L.latLng(currentUser.location.lat, currentUser.location.lng), L.latLng(lat, lng)],
                routeWhileDragging: false,
                addWaypoints: false,
                fitSelectedRoutes: true,
                lineOptions: { styles: [{ color: '#10b981', weight: 6, opacity: 0.8 }] },
                show: false // Скрыть текстовые инструкции по дефолту
            }).addTo(mapInstance);
            mapInstance.closePopup();
        }

        function updateGeo() {
            if (!navigator.geolocation) return showToast('Геолокация не поддерживается');
            navigator.geolocation.getCurrentPosition(
                p => {
                    if (currentUser) {
                        currentUser.location = { lat: p.coords.latitude, lng: p.coords.longitude };
                        const dbU = allUsers.find(u => u.id === currentUser.id);
                        if (dbU) dbU.location = currentUser.location;
                        save('ekb_users', allUsers);
                    }
                    if (mapInstance) {
                        mapInstance.setView([p.coords.latitude, p.coords.longitude], 15);
                        refreshMapMarkers();
                    }
                    showToast('Координаты обновлены', '📍');
                },
                () => showToast('Ошибка доступа к GPS', '⚠️')
            );
        }

        // ==========================================
        // РЕНДЕР СТРАНИЦ
        // ==========================================
        function renderMap() {
            const root = document.getElementById('appRoot');
            root.innerHTML = `
            <div class="card" style="padding:1rem;">
                <div class="flex-between mb-1">
                    <h3><i class="fas fa-map-marked-alt text-primary"></i> Экибастуз</h3>
                    <div>
                        <button class="btn btn-outline" style="padding:8px 12px;" onclick="updateGeo()"><i class="fas fa-crosshairs"></i></button>
                        ${(currentUser?.role === 'moderator' || currentUser?.role === 'creator') ? `<button class="btn btn-primary" style="padding:8px 12px;" onclick="createNewQuest()"><i class="fas fa-plus"></i> Квест</button>` : ''}
                    </div>
                </div>
                <div id="mainMap" class="map-container"></div>

            <h3 class="mb-1">⚡ Срочные задания</h3>

                    </div>
                    <button class="btn btn-danger" onclick="openQuestSubmit('${q.id}')">Взять</button>
                </div>
            `).join('');

        }

        function renderShop() {
            if (!currentUser) return showAuthWall();

            const root = document.getElementById('appRoot');
            root.innerHTML = `
            <div class="flex-between mb-1">
                <h2><i class="fas fa-store"></i> Лавка редкостей</h2>
                <div class="badge" style="font-size:1rem;"><i class="fas fa-coins"></i> ${currentUser.points}</div>
            </div>
            
            <div class="tabs">
                <button class="tab-btn ${currentShopTab === 'avatars' ? 'active' : ''}" onclick="currentShopTab='avatars'; renderShop()">Аватары</button>
                <button class="tab-btn ${currentShopTab === 'backgrounds' ? 'active' : ''}" onclick="currentShopTab='backgrounds'; renderShop()">Фоны профиля</button>
                <button class="tab-btn ${currentShopTab === 'boosts' ? 'active' : ''}" onclick="currentShopTab='boosts'; renderShop()">Бусты</button>
            </div>
            
            <div class="shop-grid">
                ${shopItems.filter(i => i.type === (currentShopTab === 'backgrounds' ? 'background' : currentShopTab === 'boosts' ? 'boost' : 'avatar')).map(item => {
                const hasItem = currentUser.inventory.includes(item.id);
                let btnHtml = '';
                if (item.type === 'boost') {
                    btnHtml = `<button class="btn btn-accent" style="width:100%; padding:8px;" onclick="buyItem('${item.id}')">${item.price} 🪙</button>`;
                } else {
                    btnHtml = hasItem
                        ? `<button class="btn btn-outline" style="width:100%; padding:8px; border-color:var(--success); color:var(--success)" onclick="equipItem('${item.id}')">Экипировать</button>`
                        : `<button class="btn btn-primary" style="width:100%; padding:8px;" onclick="buyItem('${item.id}')">${item.price} 🪙</button>`;
                }

                return `
                    <div class="shop-card">
                        <div class="preview" ${item.type === 'background' ? `style="background: ${item.value}; background-size:cover; border-radius:12px;"` : ''}>

                        </div>
                        <h4 style="font-size:0.9rem;">${item.name}</h4>
                        <p class="text-muted mb-1" style="font-size:0.75rem;">${item.desc}</p>
                        ${btnHtml}
                    </div>
                `}).join('')}
            </div>
        `;
        }

        function renderProfile() {
            if (!currentUser) return showAuthWall();
            const root = document.getElementById('appRoot');

            const xpForNext = Math.pow(currentUser.level, 2) * 100;
            const xpCurrentLvl = Math.pow(currentUser.level - 1, 2) * 100;
            const progress = Math.max(0, Math.min(100, ((currentUser.xp - xpCurrentLvl) / (xpForNext - xpCurrentLvl)) * 100));

            let boostHtml = '';
            if (currentUser.activeBoosts && currentUser.activeBoosts.length > 0) {
                boostHtml = `<div class="card" style="border:1px solid var(--accent)">
                <h4><i class="fas fa-bolt" style="color:var(--accent)"></i> Активные бусты</h4>
                ${currentUser.activeBoosts.map(b => `<div class="badge mt-1">${b.type.replace('_', ' x')} (до ${new Date(b.expires).toLocaleTimeString()})</div>`).join('')}
            </div>`;
            }

            root.innerHTML = `
            <div class="profile-header" style="background-image: ${currentUser.background || 'none'}; background-color: var(--surface-light);">
                <div class="profile-content">
                    <div class="avatar-lg">${currentUser.avatar}</div>
                    <h2 class="mt-1">${currentUser.name}</h2>
                    <p class="text-muted">${currentUser.role === 'moderator' ? '👑 Модератор' : 'Волонтёр Экибастуза'}</p>
                </div>
            </div>

            <div class="card">
                <div class="flex-between">
                    <h3>Уровень ${currentUser.level}</h3>
                    <span class="text-muted">${currentUser.xp} / ${xpForNext} XP</span>
                </div>
                <div class="progress-container">
                    <div class="progress-fill" style="width: ${progress}%"></div>
                </div>
                
                <div class="grid-2 mt-1">
                    <div class="stat-box">
                        <i class="fas fa-coins text-accent"></i>
                        <h4>${currentUser.points}</h4>
                        <span class="text-muted" style="font-size:0.8rem">Монет</span>
                    </div>
                    <div class="stat-box">
                        <i class="fas fa-check-circle text-primary"></i>
                        <h4>${currentUser.completedQuests?.length || 0}</h4>
                        <span class="text-muted" style="font-size:0.8rem">Квестов</span>
                    </div>
                </div>
            </div>

            ${boostHtml}

            <button class="btn btn-danger" style="width:100%" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Выйти из аккаунта</button>
        `;
        }

        function renderMod() {
            if (!currentUser || currentUser.role !== 'moderator') return;
            const root = document.getElementById('appRoot');
            const pends = submissions.filter(s => s.status === 'pending');

            root.innerHTML = `
            <h2><i class="fas fa-shield-alt"></i> Панель Модератора</h2>
            <p class="text-muted mb-1">Заявок на проверку: ${pends.length}</p>
            
            ${pends.length === 0 ? '<div class="card text-center"><p>Всё проверено! Отличная работа.</p></div>' : ''}
            
            ${pends.map(sub => {
                const q = quests.find(x => x.id === sub.questId);
                return `
                <div class="card">
                    <div class="flex-between mb-1">
                        <b>👤 ${sub.userName}</b>
                        <span class="badge">Квест: ${q?.title || 'Удален'}</span>
                    </div>
                    <p class="mb-1"><i>"${sub.comment}"</i></p>
                    <div class="grid-2">
                        <button class="btn btn-primary" onclick="resolveSub('${sub.id}', true)"><i class="fas fa-check"></i> Одобрить</button>
                        <button class="btn btn-outline" style="color:var(--danger); border-color:var(--danger)" onclick="resolveSub('${sub.id}', false)"><i class="fas fa-times"></i> Отклонить</button>
                    </div>
                </div>
            `}).join('')}
        `;
        }

        // ==========================================
        // ЛОГИКА ДЕЙСТВИЙ
        // ==========================================
        function buyItem(id) {
            const item = shopItems.find(i => i.id === id);
            if (!item) return;
            if (currentUser.points < item.price) return showToast('Не хватает монет!', '💸');

            currentUser.points -= item.price;

            if (item.type === 'boost') {
                if (!currentUser.activeBoosts) currentUser.activeBoosts = [];
                currentUser.activeBoosts.push({ type: item.value, expires: Date.now() + 86400000 }); // 24 часа
                showToast(`Буст ${item.name} активирован!`, '⚡');
            } else {
                if (currentUser.inventory.includes(id)) return showToast('Уже куплено', '⚠️');
                currentUser.inventory.push(id);
                equipItem(id); // авто-экипировка
                showToast('Покупка успешна!', '🛍️');
            }

            syncCurrentUser();
            renderShop();
        }

        function equipItem(id) {
            const item = shopItems.find(i => i.id === id);
            if (item.type === 'avatar') currentUser.avatar = item.emoji;
            if (item.type === 'background') currentUser.background = item.value;
            syncCurrentUser();
            showToast('Экипировано', '✨');
        }

        function syncCurrentUser() {
            const dbU = allUsers.find(u => u.id === currentUser.id);
            if (dbU) {
                Object.assign(dbU, currentUser);
                save('ekb_users', allUsers);
            }
        }

        window.openQuestSubmit = (qId) => {
            if (!currentUser) return showToast('Сначала войдите', '❌');
            const q = quests.find(x => x.id === qId);

            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
            <div class="modal-card">
                <h3 class="mb-1">${q.title}</h3>
                <p class="text-muted mb-1">Опиши, что было сделано, чтобы модератор одобрил выполнение.</p>
                <textarea id="subComment" rows="3" placeholder="Я убрал весь снег..."></textarea>
                <button class="btn btn-outline mb-1" style="width:100%" onclick="alert('В демо-версии фото не загружается на сервер')"><i class="fas fa-camera"></i> Прикрепить фото</button>
                <div class="grid-2">
                    <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Отмена</button>
                    <button class="btn btn-primary" id="sendSubBtn">Отправить</button>
                </div>
            </div>
        `;
            document.body.appendChild(modal);

            modal.querySelector('#sendSubBtn').onclick = () => {
                const comment = modal.querySelector('#subComment').value;
                if (!comment) return showToast('Добавь описание!', '⚠️');

                submissions.push({
                    id: 'sub_' + Date.now(), questId: qId, userId: currentUser.id, userName: currentUser.name,
                    comment, status: 'pending', time: Date.now()
                });
                save('ekb_submissions', submissions);

                showToast('Отправлено на проверку', '✅');
                modal.remove();
            };
        }

        window.resolveSub = (subId, isApproved) => {
            const sub = submissions.find(s => s.id === subId);
            if (!sub) return;

            sub.status = isApproved ? 'approved' : 'rejected';
            save('ekb_submissions', submissions);

            if (isApproved) {
                const q = quests.find(x => x.id === sub.questId);
                if (q) {
                    addRewards(sub.userId, q.xpReward, q.coinReward);
                    const u = allUsers.find(user => user.id === sub.userId);
                    if (u) {
                        if (!u.completedQuests) u.completedQuests = [];
                        u.completedQuests.push(q.id);
                        save('ekb_users', allUsers);
                    }
                }
            }
            showToast(isApproved ? 'Одобрено' : 'Отклонено');
            renderMod();
        }

        window.createNewQuest = () => {
            const center = mapInstance.getCenter();
            const title = prompt('Название задания (например: Очистка двора)');
            if (!title) return;
            const desc = prompt('Описание задачи:');
            quests.push({
                id: 'q_' + Date.now(), title, description: desc,
                xpReward: 100, coinReward: 50, lat: center.lat, lng: center.lng,
                creatorId: currentUser.id, status: 'active', isUrgent: false
            });
            save('ekb_quests', quests);
            showToast('Задание добавлено на карту!', '📍');
            refreshMapMarkers();
        }

        // ==========================================
        // АВТОРИЗАЦИЯ
        // ==========================================
        function showAuthWall() {
            const root = document.getElementById('appRoot');
            root.innerHTML = `
            <div class="card text-center" style="margin-top: 2rem; padding: 3rem 1rem;">
                <div class="avatar-lg mb-1">🕵️</div>
                <h2>Добро пожаловать в Экибастуз</h2>
                <p class="text-muted mb-1">Чтобы брать квесты, делать покупки и получать уровни, нужно войти в систему.</p>
                <button class="btn btn-primary" onclick="showLoginModal()"><i class="fas fa-sign-in-alt"></i> Войти / Создать</button>
            </div>
        `;
        }

        window.showLoginModal = () => {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
            <div class="modal-card">
                <h2 class="mb-1 text-center">Вход в систему</h2>
                <input type="text" id="authLogin" placeholder="Логин (или Email)">
                <input type="password" id="authPass" placeholder="Пароль">
                <button class="btn btn-primary mb-1" style="width:100%" id="authBtn">Войти</button>
                <div class="text-center text-muted" style="font-size:0.8rem">
                    Для модератора: moderationforsitebeta67 / 12345676767aoao<br>
                    Или введи новый логин и пароль для авто-регистрации.
                </div>
            </div>
        `;
            document.body.appendChild(modal);

            modal.querySelector('#authBtn').onclick = () => {
                const l = modal.querySelector('#authLogin').value.trim();
                const p = modal.querySelector('#authPass').value.trim();
                if (!l || !p) return showToast('Заполни поля');

                // Ищем юзера (по логину или email)
                let user = allUsers.find(u => (u.login === l || u.email === l) && u.password === p);

                if (!user) {
                    // Авто-рега
                    user = {
                        id: 'u_' + Date.now(), name: l.split('@')[0], email: l, login: l, password: p,
                        points: 50, xp: 0, level: 1, avatar: '👤', background: '', frame: '',
                        completedQuests: [], location: EKIBASTUZ_COORDS, role: 'user', inventory: [], activeBoosts: []
                    };
                    allUsers.push(user);
                    save('ekb_users', allUsers);
                    showToast('Аккаунт создан!', '🎉');
                } else {
                    showToast('Успешный вход!', '🔓');
                }

                currentUser = user;
                updateNavForRole();
                modal.remove();

                // Ставим по центру Экибастуза при входе
                if (mapInstance) mapInstance.setView([EKIBASTUZ_COORDS.lat, EKIBASTUZ_COORDS.lng], 14);
                renderCurrentPage();
            };
        }

        window.logout = () => {
            currentUser = null;
            updateNavForRole();
            currentPage = 'map';
            updateNavUI();
            renderCurrentPage();
            showToast('Вы вышли', '👋');
        }

        // ==========================================
        // НАВИГАЦИЯ И ЯДРО
        // ==========================================
        function updateNavForRole() {
            const nav = document.getElementById('bottomNav');
            const modBtn = nav.querySelector('[data-page="mod"]');

            if (currentUser?.role === 'moderator') {
                if (!modBtn) {
                    const btn = document.createElement('button');
                    btn.className = 'bottom-nav-btn'; btn.dataset.page = 'mod';
                    btn.innerHTML = '<i class="fas fa-shield-alt"></i><span>Управ.</span>';
                    btn.onclick = () => navigateTo('mod');
                    nav.appendChild(btn);
                }
            } else {
                if (modBtn) modBtn.remove();
            }
        }

        function updateNavUI() {
            document.querySelectorAll('.bottom-nav-btn').forEach(btn => {
                if (btn.dataset.page === currentPage) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        function navigateTo(page) {
            currentPage = page;
            updateNavUI();
            renderCurrentPage();
        }

        function renderCurrentPage() {
            const root = document.getElementById('appRoot');
            root.style.animation = 'none';
            root.offsetHeight; // trigger reflow
            root.style.animation = 'fadeIn 0.3s ease';

            if (currentPage === 'map') renderMap();
            else if (currentPage === 'quests') renderQuests();
            else if (currentPage === 'donations') renderDonations();
            else if (currentPage === 'shop') renderShop();
            else if (currentPage === 'profile') renderProfile();
            else if (currentPage === 'mod') renderMod();
        }

        // Биндинг кнопок меню
        document.querySelectorAll('.bottom-nav-btn').forEach(btn => {
            btn.addEventListener('click', () => navigateTo(btn.dataset.page));
        });

        // Запуск
        window.onload = () => {
            initData();
            simulateOnlineUsers();
            renderCurrentPage();

            // Добавим уведомление для погружения
            setTimeout(() => {
                showToast('Добро пожаловать в Экибастуз!', '🏙️');
            }, 1000);
        };

    </script>
</body>

</html>
